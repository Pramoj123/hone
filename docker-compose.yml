version: "3.9"

# Run specific services: docker compose up redis -d
# Run everything:        docker compose up -d
#
# PostgreSQL is hosted on AWS RDS — not included here.
# See apps/api/.env for DATABASE_URL.

services:
  redis:
    image: redis:7-alpine
    container_name: hone_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  redis_data:
